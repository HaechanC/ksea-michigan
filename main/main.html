<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSEA - University of Michigan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #F5F1E8;
            overflow-x: hidden;
        }

        /* Header Styles */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background-color: #F5F1E8;
            border-bottom: 2px solid #5B6FB6;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            background-color: #5B6FB6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 24px;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-text .ksea {
            font-size: 36px;
            font-weight: 900;
            color: #5B6FB6;
            letter-spacing: 2px;
        }

        .logo-text .university {
            font-size: 14px;
            color: #5B6FB6;
            font-weight: 600;
        }

        nav {
            display: flex;
            gap: 40px;
            align-items: center;
        }

        nav a {
            text-decoration: none;
            color: #5B6FB6;
            font-size: 24px;
            font-weight: 800;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #3d4d7a;
        }

        .search-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        /* Main Content */
        main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 60px;
            min-height: calc(100vh - 100px);
            position: relative;
        }

        /* Left Side - Title */
        .hero-title {
            flex: 1;
            z-index: 2;
        }

        .hero-title h1 {
            font-size: 72px;
            font-weight: 900;
            color: #5B6FB6;
            line-height: 1.2;
            max-width: 600px;
        }

        /* Right Side - Register Button */
        .hero-cta {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .register-container {
            position: relative;
        }

        .register-button {
            background-color: #5B6FB6;
            color: white;
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            z-index: 2;
        }

        .register-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(91, 111, 182, 0.3);
        }

        /* Decorative Elements */
        .deco-outline {
            position: absolute;
            width: 340px;
            height: 140px;
            border: 3px solid #5B6FB6;
            border-radius: 70px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            50% {
                transform: translate(-50%, -52%) rotate(1deg);
            }
        }

        .star {
            position: absolute;
            color: #5B6FB6;
            font-size: 30px;
            z-index: 1;
        }

        .star-1 {
            top: -30px;
            right: 80px;
            animation: twinkle 2s ease-in-out infinite;
        }

        .star-2 {
            bottom: 20px;
            left: 100px;
            animation: twinkle 2.5s ease-in-out infinite 0.5s;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* Curved decorative lines */
        .curve-left {
            position: absolute;
            left: -100px;
            bottom: 0;
            width: 400px;
            height: 400px;
            border: 3px solid #5B6FB6;
            border-radius: 50%;
            border-top: none;
            border-right: none;
            opacity: 0.6;
        }

        .curve-right {
            position: absolute;
            right: -50px;
            top: 20%;
            width: 300px;
            height: 500px;
            border: 3px solid #5B6FB6;
            border-radius: 50%;
            border-bottom: none;
            border-left: none;
            opacity: 0.6;
        }

        /* Social Media Sidebar */
        .social-sidebar {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background-color: #B8C4E0;
            padding: 20px 12px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-radius: 10px 0 0 10px;
            z-index: 1000;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            background-color: #5B6FB6;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .social-icon:hover {
            transform: scale(1.1);
        }

        /* Responsive Design */
        @media (max-width: 1024px) {
            .hero-title h1 {
                font-size: 56px;
            }
            
            header {
                padding: 20px 30px;
            }
            
            main {
                padding: 60px 30px;
            }
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 20px;
            }
            
            nav {
                gap: 20px;
                flex-wrap: wrap;
                justify-content: center;
            }
            
            main {
                flex-direction: column;
                gap: 60px;
            }
            
            .hero-title h1 {
                font-size: 42px;
                text-align: center;
            }
            
            .curve-left,
            .curve-right {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo-container">
            <div class="logo-circle">
                <img src="../images/ksea_logo.jpg" alt="ksea logo" style="width: 100px; height: 100px; border-radius: 50%; object-fit: contain">
            </div>
            <div class="logo-text">
                <span class="ksea">KSEA</span>
                <span class="university">University<br>of Michigan</span>
            </div>
        </div>
        <nav>
            <a href="/events/events.html">Events</a>
            <a href="/eboard/eboard.html">E-Board</a>
            <a href="/join/join.html">Join</a>
            <a href="https://www.instagram.com/ksea.michigan/" target="_blank" class="instagram-link">
                <i class="fab fa-instagram" style="font-size: 32px; color: #5B6FB6;"></i>
            </a>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Decorative curves -->
        <div class="curve-left"></div>
        <div class="curve-right"></div>

        <!-- Left side - Title -->
        <div class="hero-title">
            <h1>Korean&nbsp;American Scientists & Engineers Association</h1>
        </div>

        <!-- Right side - Register Button -->
        <div class="hero-cta">
            <div class="register-container">
                <div class="deco-outline"></div>
                <div class="star star-1">✦</div>
                <div class="star star-2">✦</div>
                <a href="https://www.ksea.org/signUp" target="signup">
    <button class="register-button">Register Here</button>
</a>
            </div>
        </div>
    </main>

        <!-- Social Media Sidebar
        <div class="social-sidebar">
            <div class="social-icon">📷</div>
            <div class="social-icon">📘</div>
            <div class="social-icon">🐦</div>
            <div class="social-icon">🎵</div>
        </div> -->
</body>
</html>
